name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore dependencies
        run: |
          dotnet restore PaperWalls/PaperWalls.csproj -r win-x64
          dotnet restore PaperWalls.Tests/PaperWalls.Tests.csproj -r win-x64

      - name: Build
        run: |
          dotnet build PaperWalls/PaperWalls.csproj -r win-x64 --no-restore
          dotnet build PaperWalls.Tests/PaperWalls.Tests.csproj -r win-x64 --no-restore

      - name: Test
        run: dotnet test PaperWalls.Tests/PaperWalls.Tests.csproj -r win-x64 --no-build
